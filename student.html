<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng học viên</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f5ece8;
    --surface: #fdf6f3;
    --ink: #1f1518;
    --ink-soft: #4a3a3d;
    --muted: #8a7378;
    --muted-soft: #bca5aa;
    --line: #dec9c5;
    --accent: #9d2449;
    --accent-h: #b13559;
    --accent-soft: #fae5ec;
    --success: #15803d;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: linear-gradient(135deg, var(--bg) 0%, #f0dcd5 100%);
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: linear-gradient(135deg, var(--accent), var(--accent-h));
    color: #fff;
    padding: 22px 36px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: 0 4px 24px rgba(157,36,73,.22);
    flex-shrink: 0;
  }
  header .label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; opacity: .75; margin-bottom: 4px;
  }
  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px; line-height: 1.05; font-weight: 600; letter-spacing: -0.5px;
  }
  header h1 em { font-style: italic; opacity: .95; }
  header .live {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
    background: rgba(255,255,255,.18);
    padding: 6px 14px; border-radius: 999px;
  }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 0 4px rgba(74,222,128,.3);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

  main { flex: 1; display: flex; padding: 32px; overflow: hidden; }
  .board {
    flex: 1; background: var(--surface);
    border-radius: 24px;
    box-shadow: 0 16px 48px rgba(157,36,73,.18);
    border: 2px solid var(--accent);
    padding: 56px 64px;
    overflow-y: auto;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px; line-height: 1.65;
    color: var(--ink-soft);
    white-space: pre-wrap; word-break: break-word;
    font-weight: 500;
  }
  .board.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--muted-soft); font-style: italic;
    text-align: center; font-size: 28px;
  }
  .board::-webkit-scrollbar { width: 10px; }
  .board::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 999px; }
  .board::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  footer {
    text-align: center;
    padding: 16px 36px;
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted-soft);
    letter-spacing: 0.4px;
  }
  footer .heart { color: var(--accent); font-style: normal; }
</style>
</head>
<body>

<header>
  <div>
    <div class="label">Chủ đề buổi học</div>
    <h1 id="topic"><em>Đang chờ kết nối...</em></h1>
  </div>
  <div class="live"><span class="dot"></span>LIVE</div>
</header>

<main>
  <div class="board empty" id="board">Giáo viên sẽ chia sẻ nội dung tại đây ✏️</div>
</main>

<footer>Made with <span class="heart">♥</span> — Anh</footer>

<script>
const topicEl = document.getElementById('topic');
const boardEl = document.getElementById('board');

function apply(s) {
  if (!s) return;
  topicEl.textContent = s.topic ? s.topic : 'Buổi học tiếng Anh';
  // Smart auto-scroll: theo dõi đáy nếu HS đang gần đáy; không giật khi HS cuộn lên xem lại
  const nearBottom = boardEl.scrollHeight - boardEl.scrollTop - boardEl.clientHeight < 24;
  if (s.board && s.board.trim()) {
    boardEl.classList.remove('empty');
    boardEl.textContent = s.board;
  } else {
    boardEl.classList.add('empty');
    boardEl.textContent = 'Giáo viên sẽ chia sẻ nội dung tại đây ✏️';
  }
  if (nearBottom) boardEl.scrollTop = boardEl.scrollHeight;
}

// BroadcastChannel
let ch = null;
if ('BroadcastChannel' in window) {
  ch = new BroadcastChannel('etb-present');
  ch.onmessage = e => apply(e.data);
  ch.postMessage({ type: 'hello' });
}

// storage event
window.addEventListener('storage', e => {
  if (e.key === 'etb_present' && e.newValue) apply(JSON.parse(e.newValue));
});

// initial load + poll fallback (works on file:// too)
let last = '';
function poll() {
  const raw = localStorage.getItem('etb_present');
  if (raw && raw !== last) { last = raw; try { apply(JSON.parse(raw)); } catch {} }
}
poll();
setInterval(poll, 2000); // BroadcastChannel + storage event là chính; poll chỉ là fallback nên 2s đủ

// Service Worker — cache để mở lại tức thì
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
